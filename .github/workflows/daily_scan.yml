name: Daily Event Scan

on:
  schedule:
    - cron: '30 0 * * 1-5'   # UTC 00:30 = 台灣 08:30（主排程）
    - cron: '0 2 * * 1-5'    # UTC 02:00 = 台灣 10:00（備用排程）
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run event scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE=$(date +%Y%m%d)
          python event_scanner.py \
            --hours 24 \
            --top 30 \
            --llm \
            --output output/signal_${DATE}.csv \
            --report output/ \
            --community output/

      - name: Generate index.html
        run: |
          # 確保 output 目錄存在
          mkdir -p output
          
          # 取得今日與昨日的日期，確保跳轉不會因為 UTC 轉換而 404
          DATE=$(date +%Y%m%d)
          
          # 尋找 output 目錄下最新的一個 community_*.html 檔案
          LATEST_HTML=$(ls -t output/community_*.html 2>/dev/null | head -n 1 | xargs -n 1 basename 2>/dev/null)
          TARGET=${LATEST_HTML:-"community_${DATE}.html"}

          cat > output/index.html << EOF
          <!DOCTYPE html>
          <html lang="zh-TW">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="3; url=${TARGET}">
            <title>財經熱點日報</title>
            <style>
              body { font-family: sans-serif; text-align: center; padding-top: 50px; color: #444; }
              .btn { display: inline-block; padding: 10px 20px; background: #2980b9; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; }
            </style>
          </head>
          <body>
            <h2>📊 正在跳轉至最新日報...</h2>
            <p>如果三秒後沒有跳轉，請點擊下方按鈕：</p>
            <a href="${TARGET}" class="btn">前往今日報告 (${TARGET})</a>
          </body>
          </html>
          EOF

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit --allow-empty -m "chore: daily scan $(date +%Y-%m-%d %H:%M)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
