name: Daily Event Scan

on:
  schedule:
    - cron: '30 0 * * 1-5'   # UTC 00:30 = 台灣 08:30（主排程）
    - cron: '0 2 * * 1-5'    # UTC 02:00 = 台灣 10:00（備用排程）
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run event scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE=$(date +%Y%m%d)
          python event_scanner.py \
            --hours 24 \
            --top 30 \
            --llm \
            --output output/signal_${DATE}.csv \
            --report output/ \
            --community output/

      - name: Generate index.html
        run: |
          DATE=$(date +%Y%m%d)
          cat > output/index.html << EOF
          <!DOCTYPE html>
          <html lang="zh-TW">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=community_${DATE}.html">
            <title>財經熱點日報</title>
          </head>
          <body>
            <p>正在跳轉至今日報告... <a href="community_${DATE}.html">點此前往</a></p>
          </body>
          </html>
          EOF

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit --allow-empty -m "chore: daily scan $(date +%Y-%m-%d %H:%M)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
